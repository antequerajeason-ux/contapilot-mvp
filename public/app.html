<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContaPilot | Acceso</title>
  <style>
    :root{--bg:#dff7ff;--text:#0b1020;--muted:#5f6675;--line:#dfe7ef;--accent:#18d6a3;--lime:#c9ff6b;--primary:#111827;--card:#ffffff;--shadow:0 25px 80px rgba(15,23,42,.14)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 18% 10%,rgba(104,87,255,.22),transparent 30%),radial-gradient(circle at 85% 18%,rgba(24,214,163,.20),transparent 28%),linear-gradient(180deg,#eaf7ff 0%,#f8fbff 85%);min-height:100vh;overflow-x:hidden}button,input{font-family:inherit}.nav{position:sticky;top:16px;z-index:20;width:min(1320px,calc(100% - 32px));margin:16px auto 0;height:64px;border-radius:32px;background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.9);box-shadow:0 15px 45px rgba(15,23,42,.12);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:space-between;padding:0 14px 0 18px}.brand{display:flex;align-items:center;gap:10px;font-size:26px;font-weight:950;letter-spacing:-.05em}.mark{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,#6857ff,#18d6a3);position:relative;display:grid;place-items:center;color:#fff;font-size:15px;font-weight:950;box-shadow:0 14px 30px rgba(104,87,255,.25)}.mark:before{content:'CP';position:relative;z-index:2}.mark:after{content:"";position:absolute;width:26px;height:12px;border:2px solid rgba(255,255,255,.72);border-left:0;border-right:0;border-radius:50%;transform:rotate(-28deg)}.links{display:flex;gap:34px;font-weight:750}.links a{cursor:pointer;transition:.2s}.links a:hover{color:#6857ff;transform:translateY(-2px)}.nav-actions{display:flex;align-items:center;gap:12px}.globe{width:38px;height:38px;border-radius:50%;border:1px solid #111;display:grid;place-items:center;background:white}.cta{height:44px;border:1px solid #7adf9f;border-radius:999px;background:linear-gradient(135deg,var(--lime),#ecffb5);padding:0 28px;font-weight:950;cursor:pointer;transition:.22s;box-shadow:inset 0 -3px 0 rgba(0,0,0,.08)}.cta:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 12px 30px rgba(104,87,255,.18)}.hero{width:min(980px,calc(100% - 32px));margin:72px auto 0;text-align:center}.hero h1{font-size:clamp(48px,7vw,82px);line-height:1.04;letter-spacing:-.07em;margin:0 0 22px}.hero p{font-size:18px;line-height:1.55;max-width:680px;margin:0 auto;color:#1f2937}.prompt{margin:38px auto 0;width:min(560px,100%);height:124px;border-radius:24px;background:rgba(255,250,247,.92);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.9);display:flex;align-items:flex-start;justify-content:space-between;padding:22px 16px 16px 24px;text-align:left;transition:.25s}.prompt:hover{transform:translateY(-5px);box-shadow:0 32px 90px rgba(15,23,42,.18)}.prompt span{color:#666;font-size:14px}.send{align-self:flex-end;width:42px;height:42px;border-radius:50%;border:0;background:linear-gradient(135deg,#6857ff,#18d6a3);color:white;font-size:24px;cursor:pointer;transition:.2s}.send:hover{transform:rotate(-45deg) scale(1.08)}.chips-title{margin-top:34px;color:#536071;font-size:12px;font-weight:950;letter-spacing:.04em}.chips{margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.chip{height:38px;border-radius:999px;border:1px solid #cfd8e3;background:rgba(255,255,255,.7);padding:0 18px;font-weight:850;cursor:pointer;transition:.2s}.chip:hover{background:white;transform:translateY(-3px);box-shadow:0 10px 22px rgba(15,23,42,.10)}.auth-card{width:min(470px,calc(100% - 32px));margin:44px auto 70px;background:rgba(255,255,255,.9);border:1px solid white;border-radius:28px;box-shadow:var(--shadow);padding:24px;transition:.25s}.tabs{display:grid;grid-template-columns:1fr 1fr;background:#f3f6fb;border-radius:16px;padding:5px;margin-bottom:18px}.tab{height:42px;border:0;border-radius:13px;background:transparent;font-weight:950;cursor:pointer}.tab.active{background:white;box-shadow:0 8px 20px rgba(15,23,42,.08)}.field{margin-bottom:12px}.field label{display:block;font-size:13px;font-weight:900;margin-bottom:7px}.field input{height:48px;width:100%;border:1px solid #d7dfeb;border-radius:15px;padding:0 14px;outline:0}.field input:focus{border-color:#6857ff;box-shadow:0 0 0 4px rgba(104,87,255,.12)}.btn{height:48px;border:0;border-radius:15px;font-weight:950;cursor:pointer;width:100%;transition:.2s}.btn-dark{background:#111827;color:white}.btn-dark:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(17,24,39,.24)}.log{margin-top:14px;background:#111827;color:white;border-radius:16px;padding:12px;font-family:ui-monospace,Consolas,monospace;font-size:12px;white-space:pre-wrap;display:none}.log.show{display:block}.float{position:fixed;border-radius:50%;pointer-events:none;filter:blur(.2px);opacity:.8}.f1{width:90px;height:90px;background:#6857ff;left:7%;top:32%;animation:float 8s ease-in-out infinite}.f2{width:70px;height:70px;background:#18d6a3;right:9%;top:45%;animation:float 9s ease-in-out infinite reverse}@keyframes float{50%{transform:translateY(-26px) translateX(12px)}}@media(max-width:780px){.links{display:none}.nav{top:8px}.hero{margin-top:48px}.auth-card{margin-top:28px}}
  </style>
<script src="config.js"></script>
</head>
<body>
  <div class="float f1"></div><div class="float f2"></div>
  <nav class="nav"><div class="brand"><div class="mark"></div>ContaPilot</div><div class="links"><a>Precios</a><a>Contadores</a><a>Funciones</a><a>Integraciones</a></div><div class="nav-actions"><div class="globe">◎</div><button class="cta" onclick="document.getElementById('email').focus()">Empieza a crear</button></div></nav>
  <main class="hero"><h1>Tu copiloto para cierres contables</h1><p>Centraliza empresas, importa facturas electrónicas, valida el NIT receptor y genera causaciones listas para revisar.</p><div class="prompt"><span>Quiero procesar facturas XML y causar compras automáticamente</span><button class="send" onclick="document.getElementById('email').focus()">↑</button></div><div class="chips-title">ELIGE UN FLUJO PARA COMENZAR:</div><div class="chips"><button class="chip">Validar facturas</button><button class="chip">Configurar reglas</button><button class="chip">Exportar causaciones</button></div></main>
  <section class="auth-card"><div class="tabs"><button id="tabRegister" class="tab active" onclick="mode='register';paintTabs()">Registro</button><button id="tabLogin" class="tab" onclick="mode='login';paintTabs()">Login</button></div><div class="field" id="nameBox"><label>Nombre</label><input id="name" value="Contador Demo"></div><div class="field"><label>Email</label><input id="email" value="demo@contapilot.com"></div><div class="field"><label>Contraseña</label><input id="password" type="password" value="123456"></div><button class="btn btn-dark" onclick="submitAuth()" id="submitBtn">Crear cuenta e ingresar</button><div id="log" class="log"></div></section>
<script>
let mode='register';function base(){return localStorage.getItem('cp_api_base')||window.CONTAPILOT_API_BASE||''}function paintTabs(){tabRegister.classList.toggle('active',mode==='register');tabLogin.classList.toggle('active',mode==='login');nameBox.style.display=mode==='register'?'block':'none';submitBtn.textContent=mode==='register'?'Crear cuenta e ingresar':'Iniciar sesión'}function log(m,o){logEl=document.getElementById('log');logEl.classList.add('show');logEl.textContent=m+(o?'\n'+JSON.stringify(o,null,2):'')}async function api(path,opts={}){const r=await fetch(base()+path,{headers:{'Content-Type':'application/json'},...opts});const data=await r.json().catch(()=>({}));if(!r.ok){const d=data.detail||data.error||data;throw new Error(typeof d==='string'?d:JSON.stringify(d))}return data}async function submitAuth(){try{const payload=mode==='register'?{name:name.value,email:email.value,password:password.value}:{email:email.value,password:password.value};const data=await api(mode==='register'?'/api/auth/register':'/api/auth/login',{method:'POST',body:JSON.stringify(payload)});localStorage.setItem('cp_token',data.token);localStorage.setItem('cp_user',JSON.stringify(data.user));location.href='centro-facturas.html'}catch(e){log('Error', {error:e.message}); if(mode==='register' && String(e.message).includes('UNIQUE')){mode='login';paintTabs();log('Ese correo ya existe. Presiona iniciar sesión.')}}}
paintTabs();
</script>
</body>
</html>
